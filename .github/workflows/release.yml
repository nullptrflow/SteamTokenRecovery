name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Compile
      run: |
        cl /EHsc /O2 /MT src/main.cpp /FeSteamTokenRecovery.exe Crypt32.lib

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SteamTokenRecovery
        path: SteamTokenRecovery.exe

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: SteamTokenRecovery.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}